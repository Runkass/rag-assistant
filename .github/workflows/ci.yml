name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install core dependencies
        # Note: requirements-ml.txt (torch, sentence-transformers) is NOT
        # installed in CI — unit tests mock embedder/reranker/LLM and don't
        # need ~3 GB of ML wheels. Keeps CI fast and free.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        env:
          OPENAI_API_KEY: ci-test-key
          OPENAI_BASE_URL: https://example.invalid
          LLM_MODEL: gpt-4o-mini
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        run: pytest -q
